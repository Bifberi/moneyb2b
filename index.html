<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f2f2f7; color: #1c1c1e;
  min-height: 100vh; display: flex; flex-direction: column;
  max-width: 430px; margin: 0 auto;
}
.header {
  background: #fff; padding: 12px 18px 10px;
  border-bottom: 0.5px solid #e0e0e5;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 20;
}
.hdr-title { font-size: 16px; font-weight: 600; color: #1c1c1e; }
.hdr-month { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8e8e93; }
.hdr-month button { background: none; border: none; color: #007aff; font-size: 20px; cursor: pointer; padding: 0 3px; line-height: 1; }
#cur-month { font-weight: 500; color: #1c1c1e; min-width: 80px; text-align: center; }
.tabs { display: flex; background: #fff; border-bottom: 0.5px solid #e0e0e5; padding: 0 12px; }
.tab-btn { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: #8e8e93; font-size: 12px; font-family: inherit; padding: 9px 4px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tab-btn span { font-size: 16px; }
.tab-btn.active { color: #007aff; border-bottom-color: #007aff; }
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }
.balance-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 10px 12px 8px; background: #fff; border-bottom: 0.5px solid #e0e0e5; }
.bal-c { background: #f2f2f7; border-radius: 10px; padding: 7px 8px; text-align: center; }
.bl { font-size: 9px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.bv { font-size: 13px; font-weight: 600; }
.bv.inc { color: #34c759; } .bv.exp { color: #ff3b30; } .bv.bal { color: #007aff; }
.numpad-section { display: flex; flex-direction: column; padding: 10px 12px 6px; background: #fff; border-bottom: 0.5px solid #e0e0e5; }
.amount-display { background: #f2f2f7; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.amount-main { font-size: 36px; font-weight: 300; letter-spacing: -1px; color: #1c1c1e; flex: 1; min-width: 0; }
.amount-main .placeholder { color: #c7c7cc; font-size: 22px; font-weight: 400; }
.amount-type-toggle { display: flex; gap: 5px; flex-shrink: 0; }
.type-pill { background: #e5e5ea; border: none; border-radius: 20px; padding: 6px 13px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; color: #8e8e93; }
.type-pill.exp.active { background: #ffe5e3; color: #ff3b30; }
.type-pill.inc.active { background: #e3f9e8; color: #34c759; }
.cat-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; margin-bottom: 10px; }
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-chip { background: #f2f2f7; border: 0.5px solid #d1d1d6; border-radius: 20px; padding: 6px 13px; font-size: 12px; white-space: nowrap; cursor: pointer; transition: all 0.15s; color: #3c3c43; flex-shrink: 0; }
.cat-chip.selected { background: #e5eeff; border-color: #007aff; color: #007aff; }
.numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.np-btn { background: #f2f2f7; border: none; border-radius: 14px; color: #1c1c1e; font-size: 28px; font-weight: 400; padding: 18px 8px; cursor: pointer; font-family: inherit; transition: background 0.1s, transform 0.08s; display: flex; align-items: center; justify-content: center; min-height: 64px; box-shadow: 0 1px 2px rgba(0,0,0,0.07); }
.np-btn:active { background: #e0e0e5; transform: scale(0.94); }
.np-btn.del-btn { font-size: 22px; color: #8e8e93; }
.np-btn.add-btn { grid-column: span 1; grid-row: span 2; background: #007aff; color: #fff; font-size: 14px; font-weight: 600; flex-direction: column; gap: 5px; line-height: 1.2; box-shadow: 0 2px 8px rgba(0,122,255,0.25); }
.np-btn.add-btn span { font-size: 26px; }
.np-btn.add-btn:active { background: #0062cc; }
.desc-row { margin-bottom: 10px; }
.desc-inp { width: 100%; background: #f2f2f7; border: 0.5px solid #d1d1d6; border-radius: 10px; color: #1c1c1e; font-size: 14px; padding: 10px 13px; outline: none; font-family: inherit; }
.desc-inp::placeholder { color: #c7c7cc; }
.desc-inp:focus { border-color: #007aff; background: #fff; }
.recent-wrap { padding: 0 12px 16px; flex: 1; overflow-y: auto; }
.sec-title { font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.6px; margin: 14px 0 8px; }
.tx-list { display: flex; flex-direction: column; gap: 6px; }
.tx-item { background: #fff; border-radius: 12px; padding: 11px 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.12s; border: 0.5px solid #e5e5ea; }
.tx-item:active { background: #f2f2f7; }
.tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1c1c1e; }
.tx-meta { font-size: 11px; color: #8e8e93; margin-top: 2px; }
.tx-amt { font-size: 14px; font-weight: 600; flex-shrink: 0; }
.tx-amt.income { color: #34c759; } .tx-amt.expense { color: #ff3b30; }
.edit-panel { display: none; background: #f9f9fb; border: 0.5px solid #e5e5ea; border-radius: 10px; padding: 10px; margin-top: 6px; }
.edit-panel.visible { display: block; }
.ep-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
.ep-inp { background: #fff; border: 0.5px solid #d1d1d6; border-radius: 8px; color: #1c1c1e; font-size: 12px; padding: 8px 10px; outline: none; font-family: inherit; width: 100%; }
.ep-inp:focus { border-color: #007aff; }
.ep-save { width: 100%; background: #007aff; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; padding: 9px; cursor: pointer; font-family: inherit; margin-bottom: 5px; }
.ep-del { background: #fff5f5; color: #ff3b30; border: 0.5px solid rgba(255,59,48,0.25); margin-bottom: 0; }
.ep-del.confirm { background: #ff3b30; color: #fff; }
.all-wrap { padding: 12px; flex: 1; overflow-y: auto; }
.stats-wrap { padding: 12px; flex: 1; overflow-y: auto; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-card { background: #fff; border-radius: 12px; padding: 13px 14px; border: 0.5px solid #e5e5ea; }
.stat-lbl { font-size: 10px; color: #8e8e93; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val { font-size: 18px; font-weight: 600; color: #1c1c1e; }
.chart-wrap { background: #fff; border-radius: 12px; padding: 14px; border: 0.5px solid #e5e5ea; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-cat { font-size: 11px; color: #3c3c43; width: 70px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-bg { flex: 1; background: #f2f2f7; border-radius: 4px; height: 7px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.bar-amt { font-size: 11px; color: #8e8e93; width: 52px; text-align: right; flex-shrink: 0; }
.empty { text-align: center; color: #c7c7cc; font-size: 13px; padding: 28px 0; }
</style>
</head>
<body>

<div class="header">
  <div style="font-size:18px;color:#8e8e93">☰</div>
  <div class="hdr-title">💰 Финансы</div>
  <div class="hdr-month">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="cur-month"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="nav-home" onclick="switchPage('home')"><span>🏠</span>Главная</button>
  <button class="tab-btn" id="nav-all" onclick="switchPage('all')"><span>📋</span>Все</button>
  <button class="tab-btn" id="nav-stats" onclick="switchPage('stats')"><span>📊</span>Статистика</button>
</div>

<div class="page active" id="page-home">
  <div class="balance-strip">
    <div class="bal-c"><div class="bl">Доходы</div><div class="bv inc" id="h-inc">0 ₽</div></div>
    <div class="bal-c"><div class="bl">Расходы</div><div class="bv exp" id="h-exp">0 ₽</div></div>
    <div class="bal-c"><div class="bl">Баланс</div><div class="bv bal" id="h-bal">0 ₽</div></div>
  </div>
  <div class="numpad-section">
    <div class="amount-display">
      <div class="amount-main" id="amt-display"><span class="placeholder">Введите сумму...</span></div>
      <div class="amount-type-toggle">
        <button class="type-pill exp active" id="pill-exp" onclick="setType('expense')">− Расход</button>
        <button class="type-pill inc" id="pill-inc" onclick="setType('income')">+ Доход</button>
      </div>
    </div>
    <div class="desc-row">
      <input class="desc-inp" id="desc-inp" type="text" placeholder="Описание (необязательно)">
    </div>
    <div class="cat-scroll" id="cat-chips"></div>
    <div class="numpad">
      <button class="np-btn" onclick="np('1')">1</button>
      <button class="np-btn" onclick="np('2')">2</button>
      <button class="np-btn" onclick="np('3')">3</button>
      <button class="np-btn add-btn" onclick="addTx()"><span>✓</span>Добавить</button>
      <button class="np-btn" onclick="np('4')">4</button>
      <button class="np-btn" onclick="np('5')">5</button>
      <button class="np-btn" onclick="np('6')">6</button>
      <button class="np-btn" onclick="np('7')">7</button>
      <button class="np-btn" onclick="np('8')">8</button>
      <button class="np-btn" onclick="np('9')">9</button>
      <button class="np-btn del-btn" onclick="np('del')">⌫</button>
      <button class="np-btn" onclick="np('.')">.</button>
      <button class="np-btn" onclick="np('0')">0</button>
      <button class="np-btn" onclick="np('00')">00</button>
    </div>
  </div>
  <div class="recent-wrap">
    <div class="sec-title">Последние операции</div>
    <div class="tx-list" id="tx-list-home"></div>
  </div>
</div>

<div class="page" id="page-all">
  <div class="all-wrap" id="all-wrap"></div>
</div>

<div class="page" id="page-stats">
  <div class="stats-wrap">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="sec-title">Расходы по категориям</div>
    <div class="chart-wrap" id="stat-chart"></div>
  </div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const CATS = {
  expense: ['🍕 Еда','🚗 Транспорт','🏠 Жильё','💊 Здоровье','🎮 Развлечения','👗 Одежда','📱 Связь','🛒 Прочее'],
  income:  ['💼 Зарплата','💸 Фриланс','📈 Инвестиции','🎁 Подарок','💰 Прочее']
};
const CLRS = ['#007aff','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa','#ff2d55','#30b0c7'];
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let txs = JSON.parse(localStorage.getItem('fin_tg_v1') || '[]');
let curType = 'expense', selCat = CATS.expense[0], numVal = '';
let viewDate = new Date(); viewDate.setDate(1);
let openEdit = null, pendingDelete = null;

function save() { localStorage.setItem('fin_tg_v1', JSON.stringify(txs)); }
function fmt(n) { return new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(n)+' ₽'; }
function mkey(d) { const dt=new Date(d); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'); }
function getMTxs() { return txs.filter(t=>mkey(t.date)===mkey(viewDate)); }

function np(v) {
  if (v==='del') { numVal=numVal.slice(0,-1); }
  else if (v==='.') { if (!numVal.includes('.')) numVal+=(numVal?'.':'0.'); }
  else if (v==='00') { if (numVal && numVal!=='0') numVal+='00'; }
  else { if (numVal==='0') numVal=v; else numVal+=v; if (numVal.length>10) numVal=numVal.slice(0,-1); }
  const el=document.getElementById('amt-display');
  if (numVal) { el.innerHTML=numVal+' <small style="font-size:18px;color:#8e8e93;font-weight:400">₽</small>'; el.style.color=''; }
  else { el.innerHTML='<span class="placeholder">Введите сумму...</span>'; }
}

function setType(t) {
  curType=t;
  document.getElementById('pill-exp').classList.toggle('active',t==='expense');
  document.getElementById('pill-inc').classList.toggle('active',t==='income');
  selCat=CATS[t][0]; renderCatChips();
}

function renderCatChips() {
  document.getElementById('cat-chips').innerHTML=CATS[curType].map(c=>
    `<div class="cat-chip${c===selCat?' selected':''}" onclick="selCat='${c.replace(/'/g,"\\'")}';renderCatChips()">${c}</div>`
  ).join('');
}

function addTx() {
  const amt=parseFloat(numVal);
  if (!amt||amt<=0) {
    const el=document.getElementById('amt-display');
    el.style.color='#ff3b30';
    setTimeout(()=>el.style.color='',600); return;
  }
  txs.unshift({id:Date.now().toString(),type:curType,amount:amt,category:selCat,description:document.getElementById('desc-inp').value.trim(),date:new Date().toISOString().split('T')[0]});
  save(); numVal='';
  document.getElementById('amt-display').innerHTML='<span class="placeholder">Введите сумму...</span>';
  document.getElementById('desc-inp').value='';
  render();
}

function changeMonth(d) { viewDate.setMonth(viewDate.getMonth()+d); render(); }

function toggleEdit(id) { openEdit=openEdit===id?null:id; pendingDelete=null; renderLists(); }

function saveEdit(id) {
  const t=txs.find(x=>x.id===id); if(!t) return;
  t.amount=parseFloat(document.getElementById('ea-'+id).value)||0;
  t.category=document.getElementById('ec-'+id).value;
  t.description=document.getElementById('ed-'+id).value;
  t.date=document.getElementById('edt-'+id).value;
  openEdit=null; pendingDelete=null; save(); render();
}

function delTx(id) {
  if (pendingDelete===id) {
    txs=txs.filter(x=>x.id!==id);
    openEdit=null; pendingDelete=null; save(); render();
  } else {
    pendingDelete=id;
    const btn=document.getElementById('delbtn-'+id);
    if(btn){btn.textContent='Подтвердить удаление';btn.classList.add('confirm');}
    setTimeout(()=>{if(pendingDelete===id){pendingDelete=null;if(btn){btn.textContent='Удалить';btn.classList.remove('confirm');}}},3000);
  }
}

function txBlock(t) {
  const isInc=t.type==='income';
  const isOpen=openEdit===t.id;
  return `<div>
    <div class="tx-item" onclick="toggleEdit('${t.id}')">
      <div class="tx-icon" style="background:${isInc?'#e3f9e8':'#fff5f5'}">${t.category.split(' ')[0]}</div>
      <div class="tx-info">
        <div class="tx-name">${t.description||t.category}</div>
        <div class="tx-meta">${t.category} · ${new Date(t.date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</div>
      </div>
      <span class="tx-amt ${t.type}">${isInc?'+':'-'}${fmt(t.amount)}</span>
    </div>
    <div class="edit-panel${isOpen?' visible':''}">
      <div class="ep-row">
        <input class="ep-inp" id="ea-${t.id}" type="number" value="${t.amount}" onclick="event.stopPropagation()">
        <select class="ep-inp" id="ec-${t.id}" onclick="event.stopPropagation()">${CATS[t.type].map(c=>`<option value="${c}"${c===t.category?' selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="ep-row">
        <input class="ep-inp" id="ed-${t.id}" type="text" value="${t.description||''}" placeholder="Описание" onclick="event.stopPropagation()">
        <input class="ep-inp" id="edt-${t.id}" type="date" value="${t.date}" onclick="event.stopPropagation()">
      </div>
      <button class="ep-save" onclick="event.stopPropagation();saveEdit('${t.id}')">Сохранить</button>
      <button class="ep-save ep-del" id="delbtn-${t.id}" onclick="event.stopPropagation();delTx('${t.id}')">Удалить</button>
    </div>
  </div>`;
}

function renderLists() {
  const mtxs=getMTxs().sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('tx-list-home').innerHTML=mtxs.length?mtxs.slice(0,6).map(txBlock).join(''):'<div class="empty">Нет операций за этот месяц</div>';
  document.getElementById('all-wrap').innerHTML=mtxs.length?'<div class="sec-title">Все операции за месяц</div>'+mtxs.map(txBlock).join(''):'<div class="empty">Нет операций</div>';
}

function renderHeader() {
  const mtxs=getMTxs();
  const inc=mtxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=mtxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('h-inc').textContent=fmt(inc);
  document.getElementById('h-exp').textContent=fmt(exp);
  const b=inc-exp, el=document.getElementById('h-bal');
  el.textContent=fmt(b); el.style.color=b>=0?'#34c759':'#ff3b30';
  document.getElementById('cur-month').textContent=MONTHS[viewDate.getMonth()].slice(0,3)+' '+viewDate.getFullYear();
}

function renderStats() {
  const mtxs=getMTxs();
  const inc=mtxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=mtxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const exps=mtxs.filter(t=>t.type==='expense');
  const avg=exps.length?Math.round(exp/exps.length):0;
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Доходы</div><div class="stat-val" style="color:#34c759">${fmt(inc)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Расходы</div><div class="stat-val" style="color:#ff3b30">${fmt(exp)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Операций</div><div class="stat-val">${mtxs.length}</div></div>
    <div class="stat-card"><div class="stat-lbl">Средний расход</div><div class="stat-val">${fmt(avg)}</div></div>`;
  const catMap={};
  exps.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const sc=document.getElementById('stat-chart');
  if(!sorted.length){sc.innerHTML='<div class="empty">Нет расходов</div>';return;}
  const max=sorted[0][1];
  sc.innerHTML=sorted.map(([cat,amt],i)=>`
    <div class="bar-row">
      <span class="bar-cat">${cat}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(amt/max*100)}%;background:${CLRS[i%CLRS.length]}"></div></div>
      <span class="bar-amt">${fmt(amt)}</span>
    </div>`).join('');
}

function render() { renderHeader(); renderLists(); renderStats(); }

function switchPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
}

renderCatChips(); render();
</script>
</body>
</html>
